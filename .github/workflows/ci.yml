name: CI Gate Tests

on:
  push:
    branches: [ main, feat-* ]
  pull_request:
    branches: [ main ]

jobs:
  gate-tests:
    name: Run Phase Gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install shellcheck (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck || true

      - name: Run build script
        run: ./build.sh

      - name: Execute Phase Gate Runner
        run: bash tests/run_gates.sh --phase all
