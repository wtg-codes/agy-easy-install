name: Nightly Antigravity URL Update

on:
  schedule:
    - cron: '0 0 * * *' # Run at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-url:
    runs-on: ubuntu-latest
    env:
      LATEST_URL: ''
      NEW_SHA: ''
      OLD_URL: ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Scrape latest URL
        id: scrape
        run: |
          python scrape_latest.py > versions.json
          cat versions.json
          echo "### 🔍 Scraped Latest Versions" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat versions.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Update configurations
        run: |
          # Store old linux URL for commit message
          OLD_URL=$(grep -oP '^LINUX_X64_URL="\K[^"]+' src/00_config.sh)
          echo "OLD_URL=$OLD_URL" >> "$GITHUB_ENV"

          # Patch config and rebuild
          python update_config.py versions.json src/00_config.sh
          ./build.sh

          # Extract URLs for patching
          LINUX_X64_URL=$(grep -oP '^LINUX_X64_URL="\K[^"]+' src/00_config.sh)
          MAC_ARM64_URL=$(grep -oP '^MAC_ARM64_URL="\K[^"]+' src/00_config.sh)
          MAC_X64_URL=$(grep -oP '^MAC_X64_URL="\K[^"]+' src/00_config.sh)
          WIN_X64_URL=$(grep -oP '^WIN_X64_URL="\K[^"]+' src/00_config.sh)
          WIN_ARM64_URL=$(grep -oP '^WIN_ARM64_URL="\K[^"]+' src/00_config.sh)

          # Set LATEST_URL for legacy steps and commit message
          echo "LATEST_URL=$LINUX_X64_URL" >> "$GITHUB_ENV"

          # Update the README curl command (uses LINUX_X64_URL)
          sed -i "/# TARBALL_URL/{ n; s#curl -fSsL \"[^\"]*\"#curl -fSsL \"$LINUX_X64_URL\"# }" README.md

          # Update README binary links
          sed -i "s#- \*\*Linux (x64)\*\*: \[Antigravity.tar.gz\]([^)]*)#- **Linux (x64)**: [Antigravity.tar.gz]($LINUX_X64_URL)#" README.md
          sed -i "s#- \*\*macOS (Apple Silicon)\*\*: \[Antigravity.dmg (arm64)\]([^)]*)#- **macOS (Apple Silicon)**: [Antigravity.dmg (arm64)]($MAC_ARM64_URL)#" README.md
          sed -i "s#- \*\*macOS (Intel)\*\*: \[Antigravity.dmg (x64)\]([^)]*)#- **macOS (Intel)**: [Antigravity.dmg (x64)]($MAC_X64_URL)#" README.md
          sed -i "s#- \*\*Windows (x64)\*\*: \[Antigravity.exe\]([^)]*)#- **Windows (x64)**: [Antigravity.exe]($WIN_X64_URL)#" README.md
          sed -i "s#- \*\*Windows (ARM64)\*\*: \[Antigravity.exe\]([^)]*)#- **Windows (ARM64)**: [Antigravity.exe]($WIN_ARM64_URL)#" README.md

          # Update the docs/index.html download links
          sed -i "/<!-- TARBALL_LINK_LINUX/{ n; s#href=\"[^\"]*\"#href=\"$LINUX_X64_URL\"# }" docs/index.html
          sed -i "/<!-- TARBALL_LINK_MAC_ARM/{ n; s#href=\"[^\"]*\"#href=\"$MAC_ARM64_URL\"# }" docs/index.html
          sed -i "/<!-- TARBALL_LINK_MAC_X64/{ n; s#href=\"[^\"]*\"#href=\"$MAC_X64_URL\"# }" docs/index.html
          sed -i "/<!-- TARBALL_LINK_WIN/{ n; s#href=\"[^\"]*\"#href=\"$WIN_X64_URL\"# }" docs/index.html

      - name: Lint script
        run: shellcheck -e SC1091,SC2162 antigravity-manager.sh

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/00_config.sh antigravity-manager.sh README.md docs/index.html versions.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: nightly update of Antigravity download URL

          From: $OLD_URL
          To:   $LATEST_URL"
            git push
            echo "### 📦 Commit pushed" >> "$GITHUB_STEP_SUMMARY"
            echo "Updated script, README, and landing page." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ℹ️ No changes" >> "$GITHUB_STEP_SUMMARY"
            echo "URL has not changed since last run." >> "$GITHUB_STEP_SUMMARY"
          fi
